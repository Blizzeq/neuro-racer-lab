name: Bug report
description: Report a reproducible issue in the simulator, training loop, or deployment.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce it.
  - type: textarea
    id: current-behavior
    attributes:
      label: What happened?
      description: Describe the visible problem.
      placeholder: The track jumps to the corner after zooming out...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect?
      placeholder: The track should stay centered under the cursor while zooming.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact actions, track shape, and settings if possible.
      placeholder: |
        1. Open the live demo
        2. Load the preset track
        3. Zoom out with the mouse wheel
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 124 on Windows 11
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or extra context
      description: Add console errors, screenshots, or exported JSON snapshots if useful.
